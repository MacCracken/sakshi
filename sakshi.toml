# sakshi.toml — compile-time configuration for sakshi
# Loaded via #ref "sakshi.toml" in config.cyr
# Consumers can override by placing their own sakshi.toml before including lib.cyr.

# Log level: 0=ERROR, 1=WARN, 2=INFO, 3=DEBUG, 4=TRACE
sk_cfg_log_level = 2

# Output target: 0=stderr, 1=file, 2=buffer, 3=udp
sk_cfg_output_target = 0

# Ring buffer size in bytes (used when output_target=2)
sk_cfg_ring_buf_size = 4096

# File output path length limit
sk_cfg_file_path_max = 256
