name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          set -e
          # The cyrius.cyml `[package].cyrius` pin is the single source of
          # truth for the toolchain version (CLAUDE.md § Scaffolding) — no
          # version is hardcoded in this YAML. Read the pin and hand it to the
          # upstream installer, which fetches + lays out $HOME/.cyrius/{bin,lib}
          # (including the cycc_aarch64 / cycc_win cross-backends). Mirrors patra.
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Verify toolchain
        run: cyrius --version

      - name: Resolve dependencies
        run: cyrius deps

      - name: Lint
        run: |
          for f in src/syscalls.cyr src/clock.cyr src/format.cyr src/output.cyr src/error.cyr src/trace.cyr src/span.cyr src/lib.cyr programs/smoke.cyr dist/sakshi.cyr; do
            cyrius lint "$f"
          done

      - name: Verify dist/sakshi.cyr is in sync with src/
        run: |
          sh scripts/bundle.sh
          if ! git diff --quiet dist/sakshi.cyr; then
            echo "ERROR: dist/sakshi.cyr is stale. Run 'sh scripts/bundle.sh' and commit the result."
            git --no-pager diff dist/sakshi.cyr | head -40
            exit 1
          fi
          echo "dist/sakshi.cyr matches src/ ✓"

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build -D SAKSHI_SMOKE programs/smoke.cyr build/sakshi-smoke

      - name: Smoke
        run: ./build/sakshi-smoke

      - name: Test
        # Auto-discover every tests/tcyr/*.tcyr (sakshi.tcyr + level_gate.tcyr,
        # the latter compiled at SAKSHI_LEVEL=3 to prove compile-time level
        # elimination). Matches scripts/test.sh.
        run: cyrius test

      - name: Bench
        run: cyrius bench tests/bcyr/sakshi.bcyr

  build-aarch64:
    name: Cross-build + run (aarch64)
    # Cross-build + RUN gate. Cross-builds the smoke for aarch64 and executes
    # it under qemu-user, asserting a known log line reaches stderr — the
    # aarch64 analog of the build-windows/wine gate. This lane was compile-only
    # until cyrius 6.1.16 cleared the upstream stdlib bug (the aarch64 codegen
    # path hit unresolved `vec_get` / `vec_len` and crashed the binary, exit
    # 127); 6.1.16 builds clean and the static ELF runs under qemu. See
    # docs/development/issues/2026-04-30-cyrius-lang-blockers.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          set -e
          # Pin-driven install via the upstream script (CLAUDE.md § Scaffolding);
          # lays out $HOME/.cyrius/{bin,lib} including cycc_aarch64. Mirrors patra.
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Verify cycc_aarch64 present
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cycc_aarch64" ]; then
            echo "::error::cycc_aarch64 missing from the Cyrius install"
            exit 1
          fi

      - name: Install qemu-user (aarch64 runner)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user-static

      - name: Resolve dependencies
        run: cyrius deps

      - name: Cross-build smoke (--aarch64, DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build --aarch64 -D SAKSHI_SMOKE programs/smoke.cyr build/sakshi-smoke-aarch64

      - name: Verify aarch64 ELF
        run: |
          file build/sakshi-smoke-aarch64
          file build/sakshi-smoke-aarch64 | grep -q "ARM aarch64" || { echo "FAIL: not an aarch64 ELF"; exit 1; }
          echo "sakshi-smoke-aarch64: $(wc -c < build/sakshi-smoke-aarch64) bytes"

      - name: Run under qemu — assert log reaches stderr
        run: |
          # Runtime gate (cyrius 6.1.16+): the static aarch64 ELF must actually
          # run and emit. Pre-6.1.16 this crashed (exit 127) on the unresolved
          # stdlib vec_get/vec_len path; this step is what proves it's fixed and
          # guards against a regression. Mirrors the build-windows/wine assert.
          out=$(qemu-aarch64-static build/sakshi-smoke-aarch64 2>&1 || true)
          echo "----- aarch64 binary output -----"
          echo "$out"
          echo "---------------------------------"
          echo "$out" | grep -q "sakshi smoke ok" || {
            echo "::error::aarch64 binary emitted no 'sakshi smoke ok' line — runtime regression";
            exit 1;
          }
          echo "aarch64 stderr logging reaches output ✓"

  build-windows:
    name: Cross-build + run (Windows PE)
    # PE build+RUN gate. Unlike the aarch64 lane (compile-only, runtime held
    # for qemu), this one actually executes the binary under wine and asserts
    # a known log line reaches stderr — the gate that would have caught the
    # v2.2.6 silent-drop regression (var-slot syscall numbers defeat the PE
    # reroute) at commit time instead of in a downstream consumer.
    # See docs/development/issues/2026-06-09-windows-pe-var-syscall-no-reroute.md.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          set -e
          # Pin-driven install via the upstream script (CLAUDE.md § Scaffolding);
          # lays out $HOME/.cyrius/{bin,lib} including the cycc_win PE backend.
          # Mirrors patra.
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Verify cycc_win present
        run: |
          if [ ! -x "$HOME/.cyrius/bin/cycc_win" ]; then
            echo "::error::cycc_win missing from the Cyrius install"
            exit 1
          fi

      - name: Install wine (PE runner)
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine wine64 xvfb

      - name: Resolve dependencies
        run: cyrius deps

      - name: Cross-build smoke (--win, DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build --win -D SAKSHI_SMOKE programs/smoke.cyr build/sakshi-smoke.exe

      - name: Verify PE32+ executable
        run: |
          file build/sakshi-smoke.exe
          file build/sakshi-smoke.exe | grep -q "PE32+" || { echo "FAIL: not a PE32+ executable"; exit 1; }
          echo "sakshi-smoke.exe: $(wc -c < build/sakshi-smoke.exe) bytes"

      - name: Run under wine — assert log reaches stderr
        env:
          WINEDEBUG: "-all"
          WINEPREFIX: ${{ github.workspace }}/.winepfx
          WINEARCH: win64
        run: |
          # The whole point of the gate: a clean-compiling PE that logged
          # NOTHING is the bug. Capture the binary's output and require the
          # known line to actually appear. xvfb-run keeps wine happy without
          # a display; the smoke binary writes to stderr (fd 2).
          out=$(xvfb-run -a wine build/sakshi-smoke.exe 2>&1 || true)
          echo "----- PE binary output -----"
          echo "$out"
          echo "----------------------------"
          echo "$out" | grep -q "sakshi smoke ok" || {
            echo "::error::PE binary emitted no 'sakshi smoke ok' line — Windows logging is silently dropped (W1 regression)";
            exit 1;
          }
          echo "PE stderr logging reaches output ✓"

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve in sakshi modules"; WARN=1
          fi
          if grep -rn '"/etc/' src/ 2>/dev/null; then
            echo "WARN: hardcoded /etc paths"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          # Accept either a literal `version = "X.Y.Z"` matching VERSION
          # OR the `${file:VERSION}` template (which derives from VERSION
          # itself — single source of truth).
          if grep -q '^version = "${file:VERSION}"' cyrius.cyml; then
              echo "cyrius.cyml: \${file:VERSION} (template; derives from VERSION)"
          else
              grep -q "^version = \"$VERSION\"" cyrius.cyml || { echo "FAIL: cyrius.cyml version != VERSION ($VERSION)"; exit 1; }
              echo "cyrius.cyml: literal $VERSION"
          fi
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in changelog"; exit 1; }
          echo "Version consistent across VERSION, cyrius.cyml, CHANGELOG.md"
