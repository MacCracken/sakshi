name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(cat .cyrius-toolchain | tr -d '[:space:]')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          # cc5_aarch64 packaging changed across the 5.7.x line: pre-5.7.48
          # tarballs ship it under bin/ (picked up by the bin/* copy above),
          # 5.7.48+ moved it to the tarball top-level. Cover both. (Same
          # workaround as yukti/.github/workflows/ci.yml.)
          [ -f "$CYRIUS_DIR/cc5_aarch64" ] && cp "$CYRIUS_DIR/cc5_aarch64" "$HOME/.cyrius/bin/"
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Lint
        run: |
          for f in src/syscalls.cyr src/clock.cyr src/format.cyr src/output.cyr src/error.cyr src/trace.cyr src/span.cyr src/lib.cyr programs/smoke.cyr dist/sakshi.cyr; do
            cyrius lint "$f"
          done

      - name: Verify dist/sakshi.cyr is in sync with src/
        run: |
          sh scripts/bundle.sh
          if ! git diff --quiet dist/sakshi.cyr; then
            echo "ERROR: dist/sakshi.cyr is stale. Run 'sh scripts/bundle.sh' and commit the result."
            git --no-pager diff dist/sakshi.cyr | head -40
            exit 1
          fi
          echo "dist/sakshi.cyr matches src/ ✓"

      - name: Build (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build -D SAKSHI_SMOKE programs/smoke.cyr build/sakshi-smoke

      - name: Smoke
        run: ./build/sakshi-smoke

      - name: Test
        run: cyrius test tests/tcyr/sakshi.tcyr

      - name: Bench
        run: cyrius bench tests/bcyr/sakshi.bcyr

  build-aarch64:
    name: Build (aarch64 / qemu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up qemu-user-static for aarch64
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Install Cyrius toolchain
        run: |
          CYRIUS_VERSION="${CYRIUS_VERSION:-$(cat .cyrius-toolchain | tr -d '[:space:]')}"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p "$HOME/.cyrius/bin" "$HOME/.cyrius/lib"
          cp "$CYRIUS_DIR/bin/"* "$HOME/.cyrius/bin/" 2>/dev/null || true
          cp -r "$CYRIUS_DIR/lib/"* "$HOME/.cyrius/lib/" 2>/dev/null || true
          # cc5_aarch64 packaging changed across the 5.7.x line: pre-5.7.48
          # tarballs ship it under bin/ (picked up by the bin/* copy above),
          # 5.7.48+ moved it to the tarball top-level. Cover both. (Same
          # workaround as yukti/.github/workflows/ci.yml.)
          [ -f "$CYRIUS_DIR/cc5_aarch64" ] && cp "$CYRIUS_DIR/cc5_aarch64" "$HOME/.cyrius/bin/"
          chmod +x "$HOME/.cyrius/bin/"* 2>/dev/null || true
          echo "$HOME/.cyrius/bin" >> $GITHUB_PATH
          echo "CYRIUS_HOME=$HOME/.cyrius" >> $GITHUB_ENV

      - name: Resolve dependencies
        run: cyrius deps

      - name: Cross-build smoke (--aarch64, DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build --aarch64 -D SAKSHI_SMOKE programs/smoke.cyr build/sakshi-smoke-aarch64

      - name: Verify binary is aarch64 ELF
        run: |
          file build/sakshi-smoke-aarch64
          file build/sakshi-smoke-aarch64 | grep -q "ARM aarch64" || { echo "FAIL: not an aarch64 ELF"; exit 1; }

      - name: Run smoke under qemu
        # binfmt_misc handler from setup-qemu-action runs the aarch64 ELF
        # transparently via qemu-user-static.
        run: ./build/sakshi-smoke-aarch64

      - name: Test (--aarch64, runs under qemu)
        # cyrius test --aarch64 cross-compiles then executes; binfmt_misc
        # routes the aarch64 binary through qemu.
        run: cyrius test --aarch64 tests/tcyr/sakshi.tcyr

      # Bench is omitted on the aarch64 lane: rdtsc / CNTVCT_EL0 under
      # qemu-user emulation does not reflect host cycle counts, and the
      # nanosleep-based calibration drift makes timing numbers unreliable.

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve in sakshi modules"; WARN=1
          fi
          if grep -rn '"/etc/' src/ 2>/dev/null; then
            echo "WARN: hardcoded /etc paths"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required files
        run: |
          MISSING=0
          for f in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE cyrius.cyml .cyrius-toolchain; do
            if [ -f "$f" ]; then echo "  OK: $f"
            else echo "  MISSING: $f"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "^version = \"$VERSION\"" cyrius.cyml || { echo "FAIL: cyrius.cyml version != VERSION ($VERSION)"; exit 1; }
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in changelog"; exit 1; }
          echo "Version consistent across VERSION, cyrius.cyml, CHANGELOG.md"
