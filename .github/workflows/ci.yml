name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CYRIUS_VERSION: "2.7.2"

jobs:
  # ── Build + Test ──
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Cyrius toolchain
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          cp "$CYRIUS_DIR/bin/cc2" ./build/cc2
          chmod +x ./build/cc2
          # Copy Cyrius stdlib WITHOUT overwriting sakshi's own lib/
          mkdir -p .cyrius_lib
          cp "$CYRIUS_DIR/lib/"*.cyr .cyrius_lib/ 2>/dev/null || true
          echo "Cyrius $CYRIUS_VERSION installed"

      - name: Compile tests
        run: |
          CC="./build/cc2"
          pass=0; fail=0
          for tcyr in tests/*.tcyr; do
            name=$(basename "$tcyr" .tcyr)
            if cat "$tcyr" | "$CC" > "build/$name" 2>/dev/null; then
              chmod +x "build/$name"
              echo "  built: $name ($(wc -c < "build/$name") bytes)"
              pass=$((pass + 1))
            else
              echo "  FAIL: $name (compile error)"
              cat "$tcyr" | "$CC" > /dev/null 2>&1 || true
              fail=$((fail + 1))
            fi
          done
          echo "$pass compiled, $fail failed"
          test $fail -eq 0

      - name: Run tests
        run: |
          pass=0; fail=0
          for tcyr in tests/*.tcyr; do
            name=$(basename "$tcyr" .tcyr)
            bin="build/$name"
            [ -x "$bin" ] || continue
            output=$("$bin" 2>&1) || true
            ec=$?
            summary=$(echo "$output" | grep -o '[0-9]* passed, [0-9]* failed' | tail -1)
            f=$(echo "$summary" | grep -o '[0-9]* failed' | grep -o '^[0-9]*' || echo "")
            if [ "$ec" -eq 0 ] && { [ -z "$f" ] || [ "$f" -eq 0 ]; }; then
              echo "  PASS: $name${summary:+ ($summary)}"
              pass=$((pass + 1))
            else
              echo "  FAIL: $name (exit $ec)${summary:+ ($summary)}"
              echo "$output" | grep "FAIL:" | head -3
              fail=$((fail + 1))
            fi
          done
          echo ""
          echo "$pass passed, $fail failed"
          test $fail -eq 0

  # ── Security ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve in sakshi modules"; WARN=1
          fi
          if grep -rn '"/etc/' src/ 2>/dev/null; then
            echo "WARN: hardcoded /etc paths"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  # ── Documentation ──
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required docs exist
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION CONTRIBUTING.md SECURITY.md LICENSE; do
            if [ -f "$doc" ]; then echo "  OK: $doc"
            else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING

      - name: Verify version consistency
        run: |
          VERSION=$(cat VERSION | tr -d '[:space:]')
          echo "VERSION file: $VERSION"
          grep -q "$VERSION" CHANGELOG.md || { echo "FAIL: version not in changelog"; exit 1; }
          echo "Version consistent"

      - name: Install Cyrius toolchain (for cyrdoc)
        run: |
          curl -sLO "https://github.com/MacCracken/cyrius/releases/download/$CYRIUS_VERSION/cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          tar xzf "cyrius-$CYRIUS_VERSION-x86_64-linux.tar.gz"
          CYRIUS_DIR="cyrius-$CYRIUS_VERSION-x86_64-linux"
          mkdir -p build
          # Build cyrdoc from source if not in tarball
          if [ -f "$CYRIUS_DIR/bin/cyrdoc" ]; then
            cp "$CYRIUS_DIR/bin/cyrdoc" ./build/cyrdoc
            chmod +x ./build/cyrdoc
          elif [ -f "$CYRIUS_DIR/bin/cc2" ]; then
            cp "$CYRIUS_DIR/bin/cc2" ./build/cc2
            chmod +x ./build/cc2
            echo "cyrdoc not in release — skipping doc coverage"
          fi

      - name: Doc coverage
        run: |
          if [ -x ./build/cyrdoc ]; then
            total=0
            for f in src/*.cyr lib/sakshi.cyr lib/sakshi_full.cyr; do
              [ -f "$f" ] || continue
              u=$(./build/cyrdoc --check "$f" 2>&1 | tail -1 | grep -oP '(\d+) undocumented' | grep -oP '^\d+' || echo 0)
              if [ "$u" -gt 0 ]; then echo "  $f: $u undocumented"; fi
              total=$((total + u))
            done
            echo "$total undocumented"
            test $total -eq 0
          else
            echo "skip: cyrdoc not available"
          fi
